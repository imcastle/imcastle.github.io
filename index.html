<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作職責排班系統</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 ---
    const IconCalendar = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconUsers = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconSettings = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconCheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const IconAlertCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconBarChart3 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
    const IconRefreshCw = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const IconCheckSquare = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>;
    const IconSquare = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const IconDownload = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const IconLock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;

    // --- 主程式 ---
    function ShiftSchedulerApp() {
      const initialEmployees = [
        { id: 'A', name: '同仁 A', roles: { m: true, p: true, g: true, ct: true, f: true } },
        { id: 'B', name: '同仁 B', roles: { m: true, p: true, g: true, ct: true, f: true } },
        { id: 'C', name: '同仁 C', roles: { m: true, p: true, g: true, ct: true, f: true } },
        { id: 'D', name: '同仁 D', roles: { m: true, p: true, g: true, ct: true, f: true } },
        { id: 'E', name: '同仁 E', roles: { m: true, p: true, g: true, ct: true, f: true } },
        { id: 'F', name: '同仁 F', roles: { m: true, p: true, g: true, ct: false, f: true } },
      ];

      const [currentDate, setCurrentDate] = useState(() => {
        try {
          const savedDate = localStorage.getItem('ShiftScheduler_currentDate');
          if (savedDate) return savedDate;
        } catch (e) {}
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      });

      const [employees, setEmployees] = useState(() => {
        try {
          const savedEmployees = localStorage.getItem('ShiftScheduler_employees');
          if (savedEmployees) return JSON.parse(savedEmployees);
        } catch (e) {}
        return initialEmployees;
      });

      const year = parseInt(currentDate.split('-')[0]);
      const month = parseInt(currentDate.split('-')[1]);
      const daysInMonth = new Date(year, month, 0).getDate();

      const [schedule, setSchedule] = useState({});
      const [lockedAssignments, setLockedAssignments] = useState({});
      const [assignments, setAssignments] = useState({});
      const [stats, setStats] = useState({});
      const [activeTab, setActiveTab] = useState('input');

      useEffect(() => {
        try {
          localStorage.setItem('ShiftScheduler_currentDate', currentDate);
          localStorage.setItem('ShiftScheduler_employees', JSON.stringify(employees));
        } catch (e) {}
      }, [currentDate, employees]);

      useEffect(() => {
        try {
          const savedData = localStorage.getItem(`ShiftScheduler_data_${currentDate}`);
          if (savedData) {
            const parsed = JSON.parse(savedData);
            setSchedule(parsed.schedule || {});
            setLockedAssignments(parsed.lockedAssignments || {});
            setAssignments(parsed.assignments || {});
            setStats(parsed.stats || {});
            return;
          }
        } catch (e) {}

        const initial = {};
        for (let i = 1; i <= daysInMonth; i++) {
          initial[i] = [];
        }
        setSchedule(initial);
        setLockedAssignments({});
        setAssignments({});
        setStats({});
        setActiveTab('input');
      }, [currentDate, daysInMonth]);

      useEffect(() => {
        try {
          const dataToSave = { schedule, lockedAssignments, assignments, stats };
          localStorage.setItem(`ShiftScheduler_data_${currentDate}`, JSON.stringify(dataToSave));
        } catch (e) {}
      }, [schedule, lockedAssignments, assignments, stats, currentDate]);

      const handleMonthChange = (e) => setCurrentDate(e.target.value);
      const getDayOfWeekIndex = (day) => new Date(year, month - 1, day).getDay();
      const getDayOfWeek = (day) => ['日', '一', '二', '三', '四', '五', '六'][getDayOfWeekIndex(day)];
      const isWeekend = (day) => getDayOfWeekIndex(day) === 0 || getDayOfWeekIndex(day) === 6;

      const toggleWorkStatus = (day, empId) => {
        setSchedule(prev => {
          const daySchedule = prev[day] || [];
          if (daySchedule.includes(empId)) {
            setLockedAssignments(lPrev => {
              const newLocks = { ...lPrev };
              if (newLocks[day]) {
                delete newLocks[day][empId];
              }
              return newLocks;
            });
            return { ...prev, [day]: daySchedule.filter(id => id !== empId) };
          } else {
            if (daySchedule.length >= 5) return prev;
            return { ...prev, [day]: [...daySchedule, empId] };
          }
        });
      };

      const handleLockRole = (day, empId, role) => {
        setLockedAssignments(prev => {
          const newLocks = { ...prev };
          if (!newLocks[day]) newLocks[day] = {};
          
          if (role === 'auto') {
            delete newLocks[day][empId];
          } else {
            newLocks[day][empId] = role;
          }
          return newLocks;
        });
      };

      const toggleRole = (empId, roleKey) => {
        setEmployees(prev => prev.map(emp => {
          if (emp.id === empId) {
            return { ...emp, roles: { ...emp.roles, [roleKey]: !emp.roles[roleKey] } };
          }
          return emp;
        }));
      };

      const isScheduleValid = () => {
        for (let i = 1; i <= daysInMonth; i++) {
          const count = schedule[i]?.length || 0;
          if (count !== 4 && count !== 5) return false;
        }
        return true;
      };

      const generateSchedule = () => {
        if (!isScheduleValid()) {
          alert("請確保每天上班人數為 4 人或 5 人！");
          return;
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const locks = lockedAssignments[i] || {};
          const lockedRoles = Object.values(locks);
          const uniqueLocks = new Set(lockedRoles);
          if (lockedRoles.length !== uniqueLocks.size) {
            alert(`第 ${i} 天有重複鎖定的職責，請確認！`);
            return;
          }
        }

        let newAssignments = {};
        let newStats = {};
        
        employees.forEach(emp => {
          newStats[emp.id] = { m: 0, p: 0, g: 0, ct: 0, f: 0, weekend_p: 0, weekend_ct: 0, total_shifts: 0 };
        });

        const shuffle = (array) => array.sort(() => Math.random() - 0.5);

        for (let day = 1; day <= daysInMonth; day++) {
          const weekend = isWeekend(day);
          const workingIds = schedule[day];
          let unassigned = [...workingIds];
          let dayAssign = {};

          workingIds.forEach(id => newStats[id].total_shifts++);

          let rolesToAssign = workingIds.length === 5 ? ['m', 'p', 'g', 'ct', 'f'] : ['m', 'p', 'g', 'ct'];

          const locks = lockedAssignments[day] || {};
          for (const [empId, lockedRole] of Object.entries(locks)) {
            if (unassigned.includes(empId)) {
              dayAssign[empId] = lockedRole;
              unassigned = unassigned.filter(id => id !== empId);
              
              const roleIdx = rolesToAssign.indexOf(lockedRole);
              if (roleIdx !== -1) {
                rolesToAssign.splice(roleIdx, 1);
              }
              
              newStats[empId][lockedRole]++;
              if (weekend && (lockedRole === 'ct' || lockedRole === 'p')) {
                newStats[empId][`weekend_${lockedRole}`]++;
              }
            }
          }

          shuffle(rolesToAssign); 
          
          rolesToAssign.sort((r1, r2) => {
            const count1 = unassigned.filter(id => employees.find(e => e.id === id).roles[r1]).length;
            const count2 = unassigned.filter(id => employees.find(e => e.id === id).roles[r2]).length;
            return count1 - count2;
          });

          for (const role of rolesToAssign) {
            let candidates = unassigned.filter(id => {
              const emp = employees.find(e => e.id === id);
              return emp.roles[role];
            });

            if (candidates.length === 0) {
              alert(`排班失敗！第 ${day} 天 (${getDayOfWeek(day)}) 剩餘的上班人員無法涵蓋「${role.toUpperCase()}」職責。請檢查鎖定設定或放寬同仁職責！`);
              return;
            }

            shuffle(candidates);
            
            candidates.sort((a, b) => {
              // 1. 避免連續沉重職責 (硬性規則)
              const getPenalty = (empId, currentRole) => {
                if (day === 1) return 0;
                const prevRole = newAssignments[day - 1]?.[empId];
                if (!prevRole) return 0;
                if (prevRole === 'ct' && (currentRole === 'ct' || currentRole === 'm')) return 1;
                if (prevRole === 'm' && (currentRole === 'm' || currentRole === 'ct')) return 1;
                return 0;
              };

              const penaltyA = getPenalty(a, role);
              const penaltyB = getPenalty(b, role);
              if (penaltyA !== penaltyB) return penaltyA - penaltyB;

              // 取得雙方的「可勝任職責總數」
              const empA = employees.find(e => e.id === a);
              const empB = employees.find(e => e.id === b);
              const capA = Object.values(empA.roles).filter(Boolean).length;
              const capB = Object.values(empB.roles).filter(Boolean).length;

              // 2. 【核心邏輯】：如果可勝任職責數量相同，強制優先平衡該職責的絕對數量 (確保差異 <= 1)
              if (capA === capB) {
                if (newStats[a][role] !== newStats[b][role]) {
                  return newStats[a][role] - newStats[b][role];
                }
              }

              // 3. 假日公平性 (僅針對 CT, P)
              if (weekend && (role === 'ct' || role === 'p')) {
                const weekendKey = `weekend_${role}`;
                if (newStats[a][weekendKey] !== newStats[b][weekendKey]) {
                  return newStats[a][weekendKey] - newStats[b][weekendKey];
                }
              }

              // 4. 如果可勝任職責數量不同，則看該職責佔個人總排班數的比例來平衡
              if (capA !== capB) {
                const sumA = newStats[a].m + newStats[a].p + newStats[a].g + newStats[a].ct + newStats[a].f;
                const sumB = newStats[b].m + newStats[b].p + newStats[b].g + newStats[b].ct + newStats[b].f;
                const ratioA = sumA === 0 ? 0 : newStats[a][role] / sumA;
                const ratioB = sumB === 0 ? 0 : newStats[b][role] / sumB;
                if (ratioA !== ratioB) {
                  return ratioA - ratioB;
                }
              }
              
              // 5. 最後防線
              return newStats[a][role] - newStats[b][role];
            });
            
            const selectedEmp = candidates[0];
            dayAssign[selectedEmp] = role;
            newStats[selectedEmp][role]++;
            if (weekend && (role === 'ct' || role === 'p')) {
              newStats[selectedEmp][`weekend_${role}`]++;
            }
            
            unassigned = unassigned.filter(id => id !== selectedEmp);
          }

          newAssignments[day] = dayAssign;
        }

        setAssignments(newAssignments);
        setStats(newStats);
        setActiveTab('result');
      };

      const exportToCSV = () => {
        const headers = ['日期', '星期', ...employees.map(emp => emp.name)];
        let csvContent = headers.join(',') + '\n';

        for (let day = 1; day <= daysInMonth; day++) {
          const dayAssign = assignments[day] || {};
          const row = [
            `${year}/${month}/${day}`,
            getDayOfWeek(day),
            ...employees.map(emp => {
              const role = dayAssign[emp.id];
              return role ? role.toUpperCase() : '休';
            })
          ];
          csvContent += row.join(',') + '\n';
        }

        csvContent += '\n';
        csvContent += ['--- 職責統計 ---', '', ...employees.map(() => '')].join(',') + '\n';
        
        const statRows = [
          { label: '總上班天數', key: 'total_shifts' },
          { label: 'M 職責', key: 'm' },
          { label: 'P 職責', key: 'p' },
          { label: 'G 職責', key: 'g' },
          { label: 'CT 職責', key: 'ct' },
          { label: 'F 職責', key: 'f' },
        ];

        statRows.forEach(stat => {
          const row = [
            stat.label,
            '',
            ...employees.map(emp => stats[emp.id] ? stats[emp.id][stat.key] : 0)
          ];
          csvContent += row.join(',') + '\n';
        });

        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `${year}年${month}月排班表.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const getRoleColor = (role) => {
        switch(role) {
          case 'm': return 'bg-blue-100 text-blue-800 border-blue-200';
          case 'p': return 'bg-green-100 text-green-800 border-green-200';
          case 'g': return 'bg-purple-100 text-purple-800 border-purple-200';
          case 'ct': return 'bg-red-100 text-red-800 border-red-200';
          case 'f': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
          default: return 'bg-gray-100 text-gray-400 border-gray-200';
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-6 font-sans">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <div>
                <h1 className="text-2xl font-bold text-gray-800 flex items-center">
                  <IconCalendar className="w-6 h-6 mr-2 text-indigo-600" />
                  {year} 年 {month} 月 工作職責排班系統
                </h1>
                <div className="flex items-center mt-3">
                  <label className="text-sm text-gray-600 mr-2 font-medium">選擇排班月份：</label>
                  <input 
                    type="month" 
                    value={currentDate}
                    onChange={handleMonthChange}
                    className="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  />
                </div>
              </div>
              <div className="flex bg-gray-100 p-1 rounded-lg">
                <button 
                  onClick={() => setActiveTab('input')}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'input' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}
                >
                  1. 設定排休與職責
                </button>
                <button 
                  onClick={() => setActiveTab('result')}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'result' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}
                >
                  2. 檢視排班結果
                </button>
              </div>
            </div>

            {/* Tab 1: Input Schedule */}
            {activeTab === 'input' && (
              <div className="space-y-6 fade-in">
                {/* Employee Roles Settings */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                    <IconUsers className="w-5 h-5 mr-2 text-indigo-500" />
                    同仁職責設定 (點擊勾選可勝任的項目)
                  </h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {employees.map(emp => {
                      const allChecked = Object.values(emp.roles).every(v => v);
                      return (
                        <div key={emp.id} className={`p-4 rounded-xl border transition-colors ${allChecked ? 'bg-gray-50 border-gray-200' : 'bg-orange-50 border-orange-200'}`}>
                          <div className="font-medium text-gray-800 mb-3">{emp.name}</div>
                          <div className="flex flex-wrap gap-3">
                            {['m', 'p', 'g', 'ct', 'f'].map(role => (
                              <button
                                key={role}
                                onClick={() => toggleRole(emp.id, role)}
                                className="flex items-center text-sm focus:outline-none group"
                              >
                                {emp.roles[role] ? (
                                  <IconCheckSquare className="w-5 h-5 text-indigo-500 mr-1.5" />
                                ) : (
                                  <IconSquare className="w-5 h-5 text-gray-300 group-hover:text-gray-400 mr-1.5" />
                                )}
                                <span className={emp.roles[role] ? 'text-gray-700 font-medium' : 'text-gray-400'}>
                                  {role.toUpperCase()}
                                </span>
                              </button>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Leave Input Table */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <h2 className="text-lg font-semibold text-gray-800 flex items-center">
                      <IconSettings className="w-5 h-5 mr-2 text-indigo-500" />
                      {month} 月排休表輸入 (每天可排 4 或 5 人上班)
                    </h2>
                    <div className="text-sm text-gray-500 flex items-center bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                      <IconLock className="w-4 h-4 mr-1.5 text-gray-400" />
                      提示：勾選上班後，可透過下拉選單手動鎖定當天職責
                    </div>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-center">
                      <thead>
                        <tr className="bg-gray-50">
                          <th className="py-3 px-2 font-medium text-gray-600 border-b">日期</th>
                          <th className="py-3 px-2 font-medium text-gray-600 border-b">星期</th>
                          {employees.map(emp => (
                            <th key={emp.id} className="py-3 px-2 font-medium text-gray-600 border-b">{emp.name}</th>
                          ))}
                          <th className="py-3 px-2 font-medium text-gray-600 border-b">上班人數</th>
                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
                          const isWknd = isWeekend(day);
                          const workingCount = schedule[day]?.length || 0;
                          const isValid = workingCount === 4 || workingCount === 5;
                          
                          return (
                            <tr key={day} className={`border-b border-gray-50 hover:bg-gray-50 ${isWknd ? 'bg-red-50/30' : ''}`}>
                              <td className="py-3 px-2 font-medium text-gray-700">{month}/{day}</td>
                              <td className={`py-3 px-2 ${isWknd ? 'text-red-500 font-medium' : 'text-gray-500'}`}>
                                {getDayOfWeek(day)}
                              </td>
                              {employees.map(emp => {
                                const isWorking = schedule[day]?.includes(emp.id);
                                const lockedRole = lockedAssignments[day]?.[emp.id] || 'auto';
                                return (
                                  <td key={emp.id} className="py-2 px-2">
                                    <div className="flex flex-col items-center justify-center gap-1.5">
                                      <button
                                        onClick={() => toggleWorkStatus(day, emp.id)}
                                        className={`w-8 h-8 rounded-md flex items-center justify-center transition-colors ${
                                          isWorking 
                                            ? 'bg-indigo-500 text-white shadow-sm' 
                                            : 'bg-gray-100 text-transparent hover:bg-gray-200 border border-gray-200'
                                        }`}
                                      >
                                        {isWorking && <IconCheckCircle className="w-5 h-5" />}
                                      </button>
                                      
                                      {isWorking ? (
                                        <select
                                          value={lockedRole}
                                          onChange={(e) => handleLockRole(day, emp.id, e.target.value)}
                                          className={`text-xs rounded border outline-none cursor-pointer ${
                                            lockedRole === 'auto' 
                                              ? 'bg-transparent border-transparent text-gray-400 hover:border-gray-300' 
                                              : 'bg-indigo-50 border-indigo-200 text-indigo-700 font-bold'
                                          }`}
                                        >
                                          <option value="auto">自動</option>
                                          <option value="m">M</option>
                                          <option value="p">P</option>
                                          <option value="g">G</option>
                                          <option value="ct">CT</option>
                                          {workingCount === 5 && <option value="f">F</option>}
                                        </select>
                                      ) : (
                                        <div className="h-5"></div>
                                      )}
                                    </div>
                                  </td>
                                );
                              })}
                              <td className="py-3 px-2">
                                <span className={`inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ${
                                  isValid ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
                                }`}>
                                  {workingCount} / 4~5
                                  {!isValid && <IconAlertCircle className="w-3 h-3 ml-1" />}
                                </span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className="p-6 bg-gray-50 border-t border-gray-100 flex justify-end">
                    <button
                      onClick={generateSchedule}
                      className="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors flex items-center font-medium shadow-sm"
                    >
                      <IconRefreshCw className="w-5 h-5 mr-2" />
                      執行自動分配職責
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Tab 2: Results & Stats */}
            {activeTab === 'result' && (
              <div className="space-y-6 fade-in">
                
                {Object.keys(assignments).length === 0 ? (
                  <div className="bg-white p-12 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <IconAlertCircle className="w-12 h-12 text-gray-300 mx-auto mb-4" />
                    <h3 className="text-lg font-medium text-gray-900">尚未產生班表</h3>
                    <p className="text-gray-500 mt-2">請先至「設定排休與職責」確認每天上班人數為 4 或 5 人，並點擊自動分配。</p>
                    <button 
                      onClick={() => setActiveTab('input')}
                      className="mt-6 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-colors font-medium"
                    >
                      前往設定
                    </button>
                  </div>
                ) : (
                  <>
                    {/* Statistics Card */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                      <h2 className="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <IconBarChart3 className="w-5 h-5 mr-2 text-indigo-500" />
                        職責分配公平性統計
                      </h2>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                          <thead>
                            <tr className="bg-gray-50 text-gray-600">
                              <th className="py-3 px-4 font-medium rounded-tl-lg">同仁</th>
                              <th className="py-3 px-4 font-medium">總上班天數</th>
                              <th className="py-3 px-4 font-medium text-blue-700">m 次數</th>
                              <th className="py-3 px-4 font-medium text-green-700">p 次數 (含假日)</th>
                              <th className="py-3 px-4 font-medium text-purple-700">g 次數</th>
                              <th className="py-3 px-4 font-medium text-red-700">ct 次數 (含假日)</th>
                              <th className="py-3 px-4 font-medium text-yellow-700">f 次數</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {employees.map(emp => {
                              const s = stats[emp.id];
                              const restrictedRoles = Object.entries(emp.roles).filter(([_, canDo]) => !canDo).map(([r]) => r.toUpperCase());
                              return (
                                <tr key={emp.id} className="hover:bg-gray-50">
                                  <td className="py-3 px-4 font-medium text-gray-800">
                                    {emp.name} 
                                    {restrictedRoles.length > 0 && (
                                      <span className="text-xs text-orange-500 ml-2 font-normal bg-orange-50 px-1.5 py-0.5 rounded">
                                        無 {restrictedRoles.join(', ')}
                                      </span>
                                    )}
                                  </td>
                                  <td className="py-3 px-4">{s.total_shifts} 天</td>
                                  <td className="py-3 px-4">{s.m}</td>
                                  <td className="py-3 px-4">
                                    {s.p} <span className="text-xs text-gray-400 ml-1">(假日: {s.weekend_p})</span>
                                  </td>
                                  <td className="py-3 px-4">{s.g}</td>
                                  <td className="py-3 px-4">
                                    {s.ct} <span className="text-xs text-gray-400 ml-1">(假日: {s.weekend_ct})</span>
                                  </td>
                                  <td className="py-3 px-4">{s.f}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* Final Schedule Table */}
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                      <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h2 className="text-lg font-semibold text-gray-800 flex items-center">
                          <IconCalendar className="w-5 h-5 mr-2 text-indigo-500" />
                          {month} 月每日職責分配表
                        </h2>
                        <button
                          onClick={exportToCSV}
                          className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center text-sm font-medium shadow-sm"
                        >
                          <IconDownload className="w-4 h-4 mr-2" />
                          匯出 CSV (Excel)
                        </button>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm text-center">
                          <thead>
                            <tr className="bg-gray-50">
                              <th className="py-3 px-4 font-medium text-gray-600 border-b w-16">日期</th>
                              <th className="py-3 px-4 font-medium text-gray-600 border-b w-16">星期</th>
                              {employees.map(emp => (
                                <th key={emp.id} className="py-3 px-4 font-medium text-gray-600 border-b">{emp.name}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
                              const isWknd = isWeekend(day);
                              const dayAssign = assignments[day] || {};
                              
                              return (
                                <tr key={day} className={`border-b border-gray-50 hover:bg-gray-50 ${isWknd ? 'bg-red-50/20' : ''}`}>
                                  <td className="py-3 px-4 font-medium text-gray-700">{month}/{day}</td>
                                  <td className={`py-3 px-4 ${isWknd ? 'text-red-500 font-medium' : 'text-gray-500'}`}>
                                    {getDayOfWeek(day)}
                                  </td>
                                  {employees.map(emp => {
                                    const role = dayAssign[emp.id];
                                    const isLocked = lockedAssignments[day]?.[emp.id] && lockedAssignments[day]?.[emp.id] !== 'auto';
                                    
                                    return (
                                      <td key={emp.id} className="py-3 px-4">
                                        {role ? (
                                          <div className="flex flex-col items-center justify-center">
                                            <span className={`inline-flex items-center justify-center w-8 h-8 rounded-lg font-bold border ${getRoleColor(role)}`}>
                                              {role.toUpperCase()}
                                            </span>
                                            {isLocked && <IconLock className="w-3 h-3 text-gray-400 mt-1" />}
                                          </div>
                                        ) : (
                                          <span className="text-gray-300 text-xs">休</span>
                                        )}
                                      </td>
                                    );
                                  })}
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ShiftSchedulerApp />);
  </script>
</body>
</html>
